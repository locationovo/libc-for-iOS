name: Build libc++ dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "iOS 部署目标"
        required: false
        default: "13.0"
      llvm_ref:
        description: "LLVM 版本"
        required: false
        default: "release/17.x"
      install_name:
        description: "dylib install_name"
        required: false
        default: "/usr/lib/libc++.custom.1.dylib"

jobs:
  build:
    runs-on: macos-13
    env:
      TARGET: ${{ github.event.inputs.deploy_target || '13.0' }}
      REF: ${{ github.event.inputs.llvm_ref || 'release/17.x' }}
      INAME: ${{ github.event.inputs.install_name || '/usr/lib/libc++.custom.1.dylib' }}

    steps:
      # 检出 LLVM 源码
      - name: Checkout LLVM
        uses: actions/checkout@v4
        with:
          repository: llvm/llvm-project
          path: src
          ref: ${{ env.REF }}
          fetch-depth: 1

      # 选择 Xcode 版本
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.2"

      # 安装 cmake 和 ninja
      - name: Install tools
        run: brew install cmake ninja

      # 获取 iPhone SDK 路径
      - name: Get SDK path
        run: echo "SDK=$(xcrun --sdk iphoneos --show-sdk-path)" >> "${GITHUB_ENV}"

      # CMake 交叉编译配置
      - name: Configure
        run: |
          mkdir -p build && cd build
          cmake ../src/runtimes \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_SYSROOT="${SDK}" \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="${TARGET}" \
            -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/install" \
            -DLLVM_ENABLE_RUNTIMES="libcxx;libcxxabi;libunwind" \
            -DLIBCXX_ENABLE_SHARED=ON \
            -DLIBCXX_ENABLE_STATIC=OFF \
            -DLIBCXXABI_ENABLE_SHARED=OFF \
            -DLIBCXXABI_ENABLE_STATIC=ON \
            -DLIBUNWIND_ENABLE_SHARED=OFF \
            -DLIBUNWIND_ENABLE_STATIC=ON \
            -DLIBCXX_STATICALLY_LINK_ABI_IN_SHARED_LIBRARY=ON \
            -DLIBCXX_CXX_ABI=libcxxabi \
            -DLIBCXXABI_USE_LLVM_UNWINDER=ON \
            -DLIBCXX_INCLUDE_TESTS=OFF \
            -DLIBCXX_INCLUDE_BENCHMARKS=OFF \
            -DLIBCXXABI_INCLUDE_TESTS=OFF \
            -DLIBUNWIND_INCLUDE_TESTS=OFF

      # 编译
      - name: Build
        run: cd build && ninja cxx cxxabi unwind

      # 安装到临时目录
      - name: Install
        run: cd build && ninja install-cxx install-cxxabi install-unwind

      # 修正 install_name
      - name: Fix install_name
        run: |
          DYLIB="${GITHUB_WORKSPACE}/install/lib/libc++.1.dylib"
          install_name_tool -id "${INAME}" "${DYLIB}"

      # 上传产物
      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: libc++.dylib
          path: install/lib/libc++.1.dylib

      # 上传头文件
      - name: Upload headers
        uses: actions/upload-artifact@v4
        with:
          name: libc++-headers
          path: install/include/
